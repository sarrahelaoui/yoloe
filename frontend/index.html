<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> YOLOE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>YoloE project</h1>
  <div class="status-cluster">
   
  </div>
</header>

<main class="workspace">

  <!-- ============ STEP 1: CLASSES ============ -->
  <section class="panel">
    <h2>1.Classes à détecter</h2>
    <div class="tag-input-wrap">
      <div class="tag-list" id="tagList"></div>
      <input type="text" id="classInput" class="text-input mono" placeholder="ex: forklift, puis Entrée">
    </div>
    <div class="run-row">
      <button class="btn btn-ghost" id="resetClassesBtn">Réinitialiser</button>
      <button class="btn btn-primary" id="applyClassesBtn">Appliquer</button>
    </div>
    <p class="mini-hint" id="activeClassesHint">Aucune classe appliquée sur le serveur pour l'instant.</p>
  </section>

  <!-- ============ STEP 2: DATASET + SELECTION ============ -->
  <section class="panel">
    <h2>2. Dataset</h2>
    <label class="btn btn-ghost file-btn">
      📁 Choisir les images du dataset
      <input type="file" id="datasetInput" accept="image/*" multiple hidden>
    </label>
    <p class="mini-hint" id="datasetHint">Aucune image chargée.</p>

    <div class="thumb-grid" id="thumbGrid"></div>
    <p class="mini-hint">Clique sur 4 images pour les marquer comme échantillon de test.</p>
  </section>

  <!-- ============ STEP 3: RUN ============ -->
  <section class="panel">
    <h2>3. Lancer</h2>
    <div class="run-row">
      <select id="imgszInput" class="text-input mono">
        <option value="320">320px (rapide)</option>
        <option value="480">480px</option>
        <option value="640" selected>640px</option>
      </select>
      <input type="number" id="confInput" value="0.25" min="0" max="1" step="0.05" class="text-input mono" title="Seuil de confiance">
    </div>
    <div class="run-row">
      <button class="btn btn-ghost" id="testBtn">🧪 Tester sur la sélection</button>
      <button class="btn btn-primary" id="runBtn">🚀 Lancer sur le reste</button>
    </div>
    <p class="mini-hint" id="phaseHint">Sélectionne 4 images ci-dessus, puis teste.</p>
  </section>

  <!-- ============ RESULTS ============ -->
  <section class="panel panel-results">
    <h2>Résultats</h2>
    <p class="mono stats-line" id="statsLine">—</p>
    <div class="gallery" id="gallery">
      <div class="empty-state">Aucun résultat pour l'instant.</div>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
